spring.application.name=prestamos-service

spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca_prestamos?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8082

#Fuerza Tomcat (servlet) aunque tengamos webflux en las dependencias
spring.main.web-application-type=servlet