#Nombre de la aplicación
spring.application.name=socios-service

#Conexion a MySQL via Laragon
#Asegurarse siempre tener el Laragon ejecutado para poder conectar al sql
spring.datasource.url=jdbc:mysql://localhost:3306/biblioteca_socios?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#JPA - Hibernate
#update: crea/actualiza las tablas automáticamente según tus entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#Puerto donde corre el microservicio
server.port=8081
