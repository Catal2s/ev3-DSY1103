server:
  port: 8087

spring:
  application:
    name: msCompras
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/gestion_biblioteca
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/gestion_biblioteca
    username: root
    password:
  jpa:
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/gestion_biblioteca
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
