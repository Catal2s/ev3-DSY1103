server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: socios-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/socios/**
          filters:
            - StripPrefix=0

        - id: prestamos-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/prestamos/**
          filters:
            - StripPrefix=0

        - id: pagos-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/pagos/**
          filters:
            - StripPrefix=0

        - id: reservas-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/reservas/**
          filters:
            - StripPrefix=0

        - id: multas-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/multas/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
