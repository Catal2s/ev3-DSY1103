spring:
  application:
    name: prestamos-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/biblioteca_prestamos?createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  main:
    web-application-type: servlet
server:
  port: ${SERVER_PORT:8082}
socios:
  service:
    url: ${SOCIOS_SERVICE_URL:http://localhost:8081}
