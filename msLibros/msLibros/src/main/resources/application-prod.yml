spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: ${PORT:8085}

services:
  autores:
    url: ${AUTORES_SERVICE_URL}
  categorias:
    url: ${CATEGORIAS_SERVICE_URL}
  editoriales:
    url: ${EDITORIALES_SERVICE_URL}
